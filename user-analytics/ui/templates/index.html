<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0c10; --surface:#111418; --surface-2:#181c22;
      --border:#252a32; --border-hi:#353d4a;
      --accent:#00e5ff; --accent-dim:rgba(0,229,255,.12); --accent-glow:rgba(0,229,255,.25);
      --success:#00e676; --warn:#ff6d00; --error:#ff1744;
      --text-1:#e8edf3; --text-2:#8a95a3; --text-3:#505866;
      --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
      --r:6px; --rl:12px; --t:160ms ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:14px}
    body{background:var(--bg);color:var(--text-1);font-family:var(--sans);
         min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}

    /* LAYOUT */
    .shell{display:grid;grid-template-rows:56px 1fr;grid-template-columns:280px 1fr;min-height:100vh}
    .header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 24px;
            background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
    .sep{width:1px;height:20px;background:var(--border-hi)}
    .subtitle{font-size:12px;color:var(--text-3);font-family:var(--mono)}
    .hstatus{margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--text-3)}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--text-3);transition:background var(--t)}
    .dot.online{background:var(--success);box-shadow:0 0 6px var(--success)}
    .dot.loading{background:var(--accent);animation:pulse 1s infinite}
    .dot.error{background:var(--error)}

    .sidebar{background:var(--surface);border-right:1px solid var(--border);
             padding:20px;display:flex;flex-direction:column;gap:24px;overflow-y:auto}
    .main{padding:24px;overflow-y:auto;background:var(--bg)}

    /* LABELS */
    .lbl{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
         text-transform:uppercase;color:var(--text-3);margin-bottom:8px}

    /* SELECT */
    .sel-wrap{position:relative}
    .sel-wrap select{width:100%;background:var(--surface-2);border:1px solid var(--border);
      color:var(--text-1);font-family:var(--sans);font-size:13px;padding:9px 12px;
      border-radius:var(--r);cursor:pointer;appearance:none;outline:none;
      transition:border-color var(--t),box-shadow var(--t)}
    .sel-wrap select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
    .sel-wrap select option{background:var(--surface-2)}
    .sel-wrap::after{content:'▾';position:absolute;right:10px;top:50%;transform:translateY(-50%);
                     color:var(--text-3);pointer-events:none;font-size:11px}

    /* INPUTS */
    .fgroup{display:flex;flex-direction:column;gap:14px}
    .ffield label{display:block;font-size:11px;color:var(--text-2);margin-bottom:5px;font-family:var(--mono)}
    .ffield input{width:100%;background:var(--surface-2);border:1px solid var(--border);
      color:var(--text-1);font-family:var(--mono);font-size:13px;padding:8px 10px;
      border-radius:var(--r);outline:none;transition:border-color var(--t),box-shadow var(--t)}
    .ffield input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}

    /* BUTTONS */
    .btn-group{display:flex;flex-direction:column;gap:8px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:9px 14px;
         font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;
         text-transform:uppercase;border-radius:var(--r);cursor:pointer;
         transition:background var(--t),box-shadow var(--t);border:1px solid}
    .btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
    .btn-csv{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
    .btn-csv:not(:disabled):hover{background:rgba(0,229,255,.2);box-shadow:0 0 12px var(--accent-glow)}
    .btn-xlsx{background:rgba(0,230,118,.1);border-color:var(--success);color:var(--success)}
    .btn-xlsx:not(:disabled):hover{background:rgba(0,230,118,.2)}
    .btn-send{background:rgba(255,109,0,.1);border-color:var(--warn);color:var(--warn)}
    .btn-send:not(:disabled):hover{background:rgba(255,109,0,.2)}

    /* METRICS */
    .mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
    .mcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
           padding:16px;position:relative;overflow:hidden}
    .mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border)}
    .mcard.c-accent::before{background:var(--accent)}
    .mcard.c-success::before{background:var(--success)}
    .mcard.c-warn::before{background:var(--warn)}
    .mlbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3)}
    .mval{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text-1);line-height:1.1;margin-top:4px}
    .msub{font-size:11px;color:var(--text-3);margin-top:2px}

    /* USER PANEL */
    .upanel{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
            padding:20px;margin-bottom:20px}
    .uname{font-size:18px;font-weight:600}
    .umeta{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px}
    .umeta-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--text-2)}
    .umeta-item .k{color:var(--text-3)}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;
           font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:.06em;
           text-transform:uppercase;margin-top:10px}
    .badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor}
    .badge.ativo{background:rgba(0,230,118,.12);color:var(--success);border:1px solid rgba(0,230,118,.25)}
    .badge.inativo{background:rgba(255,109,0,.12);color:var(--warn);border:1px solid rgba(255,109,0,.25)}

    /* TABLE */
    .tsec{margin-top:4px}
    .tsec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .tcnt{font-family:var(--mono);font-size:11px;color:var(--text-3);background:var(--surface);
          border:1px solid var(--border);padding:2px 8px;border-radius:4px}
    .twrap{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{background:var(--surface);padding:10px 14px;text-align:left;
             font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
             text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)}
    tbody tr{border-bottom:1px solid var(--border);transition:background var(--t)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:var(--surface)}
    tbody td{padding:10px 14px;font-size:12px;color:var(--text-2);vertical-align:middle}
    .ptitle{color:var(--text-1);font-weight:500;margin-bottom:2px;white-space:nowrap;
            overflow:hidden;text-overflow:ellipsis;max-width:340px}
    .pchars{font-family:var(--mono);font-size:11px;color:var(--text-3)}
    .ccnt{font-family:var(--mono);font-size:12px;background:var(--surface-2);
          padding:2px 8px;border-radius:4px;border:1px solid var(--border)}

    /* STATES */
    .sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:12px;padding:60px 20px;color:var(--text-3);font-family:var(--mono);font-size:12px}
    .spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);
          border-radius:50%;animation:spin .7s linear infinite}
    .errbox{background:rgba(255,23,68,.08);border:1px solid rgba(255,23,68,.25);
            border-radius:var(--r);padding:12px 16px;font-family:var(--mono);font-size:12px;color:var(--error)}

    /* TOAST */
    #toasts{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--surface-2);border:1px solid var(--border-hi);border-left:3px solid var(--accent);
           border-radius:var(--r);padding:10px 16px;font-family:var(--mono);font-size:12px;
           color:var(--text-1);max-width:320px;animation:slideIn .25s ease;box-shadow:0 4px 20px rgba(0,0,0,.4)}
    .toast.error{border-left-color:var(--error)}
    .toast.success{border-left-color:var(--success)}
    .toast.warn{border-left-color:var(--warn)}

    .sfoot{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
    .fade{animation:fadeIn .3s ease}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  </style>
</head>
<body>
<div class="shell">

  <header class="header">
    <span class="logo">UserAnalytics</span>
    <div class="sep"></div>
    <span class="subtitle">jsonplaceholder.typicode.com</span>
    <div class="hstatus">
      <div class="dot" id="dot"></div>
      <span id="statusTxt">inicializando</span>
    </div>
  </header>

  <aside class="sidebar">
    <div>
      <p class="lbl">Usuário</p>
      <div class="sel-wrap">
        <select id="userSelect"><option value="">Carregando…</option></select>
      </div>
    </div>
    <div>
      <p class="lbl">Filtros</p>
      <div class="fgroup">
        <div class="ffield">
          <label for="minChars">Mín. caracteres por post</label>
          <input type="number" id="minChars" min="0" value="0" placeholder="0">
        </div>
        <div class="ffield">
          <label for="minPosts">Mín. posts para ativo</label>
          <input type="number" id="minPosts" min="0" value="5" placeholder="5">
        </div>
      </div>
    </div>
    <div class="sfoot">
      <p class="lbl" style="margin-bottom:10px">Exportar / Enviar</p>
      <div class="btn-group">
        <button class="btn btn-csv"  id="btnCsv"  disabled>↓ CSV</button>
        <button class="btn btn-xlsx" id="btnXlsx" disabled>↓ Excel (.xlsx)</button>
        <button class="btn btn-send" id="btnSend" disabled>↑ Enviar relatório</button>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="sbox"><div class="spin"></div><span>carregando usuários…</span></div>
  </main>
</div>
<div id="toasts"></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const Cfg = Object.freeze({ DEBOUNCE_MS: 350 });

/* ============================================================
   STATE
   ============================================================ */
const State = {
  users:       [],
  currentUser: null,
  data:        null,   // resposta de /api/users/:id/posts
};

/* ============================================================
   DOM REFS
   ============================================================ */
const Dom = {
  userSelect: document.getElementById('userSelect'),
  minChars:   document.getElementById('minChars'),
  minPosts:   document.getElementById('minPosts'),
  btnCsv:     document.getElementById('btnCsv'),
  btnXlsx:    document.getElementById('btnXlsx'),
  btnSend:    document.getElementById('btnSend'),
  main:       document.getElementById('main'),
  dot:        document.getElementById('dot'),
  statusTxt:  document.getElementById('statusTxt'),
  toasts:     document.getElementById('toasts'),
};

/* ============================================================
   UI HELPERS
   ============================================================ */
const UI = {
  status(state, text) {
    Dom.dot.className = `dot ${state}`;
    Dom.statusTxt.textContent = text;
  },
  toast(msg, type = 'info', ms = 3500) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    Dom.toasts.appendChild(el);
    setTimeout(() => el.remove(), ms);
  },
  loading(msg = 'processando…') {
    Dom.main.innerHTML = `<div class="sbox"><div class="spin"></div><span>${msg}</span></div>`;
  },
  empty(msg = 'Selecione um usuário para começar.') {
    Dom.main.innerHTML = `<div class="sbox"><span style="font-size:24px">○</span><span>${msg}</span></div>`;
  },
  error(msg) {
    Dom.main.innerHTML = `<div class="errbox">⚠ ${msg}</div>`;
  },
  setBtns(on) {
    [Dom.btnCsv, Dom.btnXlsx, Dom.btnSend].forEach(b => b.disabled = !on);
  },
};

/* ============================================================
   UTILS
   ============================================================ */
function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function qs(params) {
  return '?' + new URLSearchParams(params).toString();
}

/* ============================================================
   RENDER
   ============================================================ */
function render(user, data) {
  const { total_posts, raw_total, avg_chars, avg_comments, is_active, status, posts } = data;
  const minPosts = Number(Dom.minPosts.value) || 0;

  const statusClass = is_active ? 'ativo' : 'inativo';

  const rows = posts.length
    ? posts.map(p => `
        <tr>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-3);width:48px">#${p.id}</td>
          <td>
            <div class="ptitle">${p.title}</div>
            <div class="pchars">${p.body_length} chars</div>
          </td>
          <td style="text-align:center"><span class="ccnt">${p.comment_count}</span></td>
        </tr>`).join('')
    : `<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--text-3);font-family:var(--mono);font-size:12px">
         Nenhum post atende ao filtro atual.</td></tr>`;

  Dom.main.innerHTML = `
    <div class="upanel fade">
      <div class="uname">${user.name}</div>
      <span class="badge ${statusClass}">${status}</span>
      <div class="umeta">
        <div class="umeta-item"><span class="k">email</span>${user.email}</div>
        <div class="umeta-item"><span class="k">empresa</span>${user.company.name}</div>
        <div class="umeta-item"><span class="k">cidade</span>${user.address.city}</div>
        <div class="umeta-item"><span class="k">website</span>${user.website}</div>
      </div>
    </div>

    <div class="mgrid fade">
      <div class="mcard c-accent">
        <div class="mlbl">Posts filtrados</div>
        <div class="mval">${total_posts}</div>
        <div class="msub">de ${raw_total} no total</div>
      </div>
      <div class="mcard c-success">
        <div class="mlbl">Média de chars</div>
        <div class="mval">${avg_chars}</div>
        <div class="msub">por post (body)</div>
      </div>
      <div class="mcard c-warn">
        <div class="mlbl">Média comentários</div>
        <div class="mval">${avg_comments}</div>
        <div class="msub">por post</div>
      </div>
      <div class="mcard ${is_active ? 'c-accent' : ''}">
        <div class="mlbl">Status</div>
        <div class="mval" style="font-size:18px;color:${is_active ? 'var(--success)' : 'var(--warn)'}">${status}</div>
        <div class="msub">mín ${minPosts} posts</div>
      </div>
    </div>

    <div class="tsec fade">
      <div class="tsec-head">
        <p class="lbl" style="margin:0">Posts</p>
        <span class="tcnt">${posts.length} resultado(s)</span>
      </div>
      <div class="twrap">
        <table>
          <thead><tr><th>ID</th><th>Título / Caracteres</th><th style="text-align:center">Comentários</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

/* ============================================================
   TASK 1: Carregamento inicial
   ============================================================ */
async function loadUsers() {
  UI.status('loading', 'buscando usuários…');
  try {
    const res   = await fetch('/api/users');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const users = await res.json();
    State.users = users;

    Dom.userSelect.innerHTML =
      '<option value="">— selecione um usuário —</option>' +
      users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');

    UI.empty();
    UI.status('online', `${users.length} usuários carregados`);
    UI.toast(`${users.length} usuários carregados.`, 'success');
  } catch (err) {
    UI.status('error', 'falha ao carregar');
    UI.error(`Não foi possível carregar os usuários: ${err.message}`);
    UI.toast(`Erro: ${err.message}`, 'error', 6000);
  }
}

/* ============================================================
   TASK 2: Seleção de usuário
   ============================================================ */
async function onUserChange(userId) {
  if (!userId) {
    State.currentUser = null;
    State.data = null;
    UI.empty();
    UI.setBtns(false);
    return;
  }

  const user = State.users.find(u => u.id === Number(userId));
  State.currentUser = user;

  await fetchAndRender();
}

/* ============================================================
   TASK 3: Recálculo por filtros (com debounce)
   ============================================================ */
async function fetchAndRender() {
  if (!State.currentUser) return;

  const minChars = Math.max(0, Number(Dom.minChars.value) || 0);
  const minPosts = Math.max(0, Number(Dom.minPosts.value) || 0);

  UI.status('loading', 'calculando…');
  UI.loading('buscando posts e comentários…');

  try {
    const params = qs({ min_chars: minChars, min_posts: minPosts });
    const res    = await fetch(`/api/users/${State.currentUser.id}/posts${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    State.data = data;

    render(State.currentUser, data);
    UI.setBtns(true);
    UI.status('online', `${State.currentUser.name}`);
  } catch (err) {
    UI.status('error', 'erro');
    UI.error(`Falha ao buscar dados: ${err.message}`);
    UI.toast(`Erro: ${err.message}`, 'error', 6000);
  }
}

/* ============================================================
   TASK 4: Export CSV
   ============================================================ */
function onExportCsv() {
  if (!State.currentUser) return;
  const minChars = Math.max(0, Number(Dom.minChars.value) || 0);
  const minPosts = Math.max(0, Number(Dom.minPosts.value) || 0);
  const params = qs({
    user_id: State.currentUser.id,
    user_name: State.currentUser.name,
    min_chars: minChars,
    min_posts: minPosts,
  });
  window.location.href = `/api/export/csv${params}`;
  UI.toast('Download CSV iniciado.', 'success');
}

/* TASK 4: Export Excel */
function onExportXlsx() {
  if (!State.currentUser) return;
  const minChars = Math.max(0, Number(Dom.minChars.value) || 0);
  const minPosts = Math.max(0, Number(Dom.minPosts.value) || 0);
  const params = qs({
    user_id: State.currentUser.id,
    user_name: State.currentUser.name,
    min_chars: minChars,
    min_posts: minPosts,
  });
  window.location.href = `/api/export/xlsx${params}`;
  UI.toast('Download Excel iniciado.', 'success');
}

/* ============================================================
   TASK 5: Enviar relatório via POST
   ============================================================ */
async function onSendReport() {
  if (!State.currentUser) return;

  Dom.btnSend.disabled = true;
  UI.status('loading', 'enviando relatório…');

  try {
    const res = await fetch('/api/report/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id:   State.currentUser.id,
        user_name: State.currentUser.name,
        min_chars: Math.max(0, Number(Dom.minChars.value) || 0),
        min_posts: Math.max(0, Number(Dom.minPosts.value) || 0),
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    UI.status('online', 'relatório enviado');
    UI.toast(`Relatório enviado com sucesso (id: ${json.response?.id}).`, 'success');
  } catch (err) {
    UI.status('error', 'falha no envio');
    UI.toast(`Falha no envio: ${err.message}`, 'error', 6000);
  } finally {
    Dom.btnSend.disabled = false;
  }
}

/* ============================================================
   BIND DE EVENTOS
   ============================================================ */
const debouncedFetch = debounce(fetchAndRender, Cfg.DEBOUNCE_MS);

Dom.userSelect.addEventListener('change', e => onUserChange(e.target.value));
Dom.minChars.addEventListener('input', debouncedFetch);
Dom.minPosts.addEventListener('input', debouncedFetch);
Dom.btnCsv.addEventListener('click',  onExportCsv);
Dom.btnXlsx.addEventListener('click', onExportXlsx);
Dom.btnSend.addEventListener('click', onSendReport);

/* BOOT */
loadUsers();
</script>
</body>
</html>
