<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Analytics — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       DESIGN TOKENS
       ========================================================= */
    :root {
      --bg:         #0a0c10;
      --surface:    #111418;
      --surface-2:  #181c22;
      --border:     #252a32;
      --border-hi:  #353d4a;
      --accent:     #00e5ff;
      --accent-dim: rgba(0, 229, 255, 0.12);
      --accent-glow:rgba(0, 229, 255, 0.25);
      --success:    #00e676;
      --warn:       #ff6d00;
      --error:      #ff1744;
      --text-1:     #e8edf3;
      --text-2:     #8a95a3;
      --text-3:     #505866;
      --mono:       'IBM Plex Mono', monospace;
      --sans:       'IBM Plex Sans', sans-serif;
      --radius:     6px;
      --radius-lg:  12px;
      --transition: 160ms ease;
    }

    /* =========================================================
       RESET & BASE
       ========================================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================================
       LAYOUT
       ========================================================= */
    .app-shell {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    /* Header */
    .app-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .app-header .separator {
      width: 1px;
      height: 20px;
      background: var(--border-hi);
    }
    .app-header .subtitle {
      font-size: 12px;
      color: var(--text-3);
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-3);
      transition: background var(--transition);
    }
    .status-dot.online  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.loading { background: var(--accent);  animation: pulse 1s infinite; }
    .status-dot.error   { background: var(--error); }

    /* Sidebar */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    /* Main */
    .main {
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
    }

    /* =========================================================
       SECTION LABELS
       ========================================================= */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    /* =========================================================
       USER SELECT
       ========================================================= */
    .user-select-wrap {
      position: relative;
    }
    .user-select-wrap select {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-1);
      font-family: var(--sans);
      font-size: 13px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      appearance: none;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .user-select-wrap select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .user-select-wrap select option {
      background: var(--surface-2);
    }
    .user-select-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      font-size: 11px;
    }

    /* =========================================================
       FILTER INPUTS
       ========================================================= */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .filter-field label {
      display: block;
      font-size: 11px;
      color: var(--text-2);
      margin-bottom: 5px;
      font-family: var(--mono);
    }
    .filter-field input[type="number"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-1);
      font-family: var(--mono);
      font-size: 13px;
      padding: 8px 10px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .filter-field input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .filter-field input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

    /* =========================================================
       METRICS CARDS
       ========================================================= */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition);
    }
    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--border);
      transition: background var(--transition);
    }
    .metric-card.active::before   { background: var(--accent); }
    .metric-card.success::before  { background: var(--success); }
    .metric-card.warning::before  { background: var(--warn); }

    .metric-card .metric-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .metric-card .metric-value {
      font-family: var(--mono);
      font-size: 26px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.1;
    }
    .metric-card .metric-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* =========================================================
       USER INFO PANEL
       ========================================================= */
    .user-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    .user-panel.visible { display: block; }
    .user-panel .user-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 4px;
    }
    .user-panel .user-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 10px;
    }
    .user-panel .user-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-2);
    }
    .user-panel .user-meta-item span.label { color: var(--text-3); }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 99px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 10px;
    }
    .status-badge.ativo {
      background: rgba(0, 230, 118, 0.12);
      color: var(--success);
      border: 1px solid rgba(0, 230, 118, 0.25);
    }
    .status-badge.inativo {
      background: rgba(255, 109, 0, 0.12);
      color: var(--warn);
      border: 1px solid rgba(255, 109, 0, 0.25);
    }
    .status-badge::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* =========================================================
       POSTS TABLE
       ========================================================= */
    .posts-section { margin-top: 20px; }
    .posts-section .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .posts-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: var(--surface);
      padding: 10px 14px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface); }
    tbody td {
      padding: 10px 14px;
      font-size: 12px;
      color: var(--text-2);
      vertical-align: middle;
    }
    tbody td .post-title {
      color: var(--text-1);
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }
    tbody td .post-chars {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-3);
    }
    .comment-count {
      font-family: var(--mono);
      font-size: 12px;
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* =========================================================
       LOADING / EMPTY STATES
       ========================================================= */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 12px;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* =========================================================
       GENERATE REPORT BUTTON
       ========================================================= */
    .btn-report {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
    }
    .btn-report:hover {
      background: rgba(0,229,255,0.2);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .btn-report:active { opacity: 0.8; }
    .btn-report:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* =========================================================
       TOAST NOTIFICATIONS
       ========================================================= */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border-hi);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-1);
      max-width: 320px;
      animation: slideIn 0.25s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.error   { border-left-color: var(--error); }
    .toast.success { border-left-color: var(--success); }

    /* =========================================================
       ERROR STATE
       ========================================================= */
    .error-box {
      background: rgba(255,23,68,0.08);
      border: 1px solid rgba(255,23,68,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--error);
    }

    /* =========================================================
       KEYFRAMES
       ========================================================= */
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    @keyframes slideIn  { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }

    .fade-in { animation: fadeIn 0.3s ease; }

    /* =========================================================
       SIDEBAR FOOTER
       ========================================================= */
    .sidebar-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* =========================================================
       SCROLLBARS
       ========================================================= */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>

<body>

<!-- ============================================================
     APP SHELL
     ============================================================ -->
<div class="app-shell">

  <!-- HEADER -->
  <header class="app-header">
    <span class="logo">UserAnalytics</span>
    <div class="separator"></div>
    <span class="subtitle">jsonplaceholder.typicode.com</span>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">inicializando</span>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- USER SELECT -->
    <div>
      <p class="section-label">Usuário</p>
      <div class="user-select-wrap">
        <select id="userSelect">
          <option value="">Carregando usuários…</option>
        </select>
      </div>
    </div>

    <!-- FILTERS -->
    <div>
      <p class="section-label">Filtros</p>
      <div class="filter-group">
        <div class="filter-field">
          <label for="minChars">Mín. caracteres por post</label>
          <input type="number" id="minChars" min="0" placeholder="0" value="0" />
        </div>
        <div class="filter-field">
          <label for="minPosts">Mín. posts para ativo</label>
          <input type="number" id="minPosts" min="0" placeholder="5" value="5" />
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="sidebar-footer">
      <p class="section-label" style="margin-bottom:12px">Ações</p>
      <button class="btn-report" id="generateReport" disabled>
        ↓ Exportar CSV
      </button>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">
    <div class="state-box">
      <div class="spinner"></div>
      <span>carregando usuários…</span>
    </div>
  </main>

</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- ============================================================
     JAVASCRIPT — ARQUITETURA MODULAR
     ============================================================ -->
<script>

/* ============================================================
   MODULE: config
   Centraliza constantes e configurações da aplicação.
   ============================================================ */
const Config = Object.freeze({
  BASE_URL:       'https://jsonplaceholder.typicode.com',
  DEBOUNCE_MS:    350,
  CACHE_TTL_MS:   5 * 60 * 1000, // 5 minutos
});


/* ============================================================
   MODULE: cache
   Cache em memória com TTL (time-to-live) por chave.
   Evita requisições redundantes à API.
   ============================================================ */
const Cache = (() => {
  const _store = new Map();

  function set(key, value) {
    _store.set(key, { value, ts: Date.now() });
  }

  function get(key) {
    const entry = _store.get(key);
    if (!entry) return null;
    if (Date.now() - entry.ts > Config.CACHE_TTL_MS) {
      _store.delete(key);
      return null;
    }
    return entry.value;
  }

  function has(key) { return get(key) !== null; }
  function clear()  { _store.clear(); }

  return { set, get, has, clear };
})();


/* ============================================================
   MODULE: api
   Wrapper de fetch com cache, tratamento de erro e status.
   Todas as chamadas são assíncronas via async/await.
   ============================================================ */
const Api = (() => {

  async function _request(path) {
    const url    = `${Config.BASE_URL}${path}`;
    const cached = Cache.get(url);
    if (cached) return cached;

    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} — ${path}`);

    const data = await res.json();
    Cache.set(url, data);
    return data;
  }

  const getUsers  = ()       => _request('/users');
  const getPosts  = (userId) => _request(`/posts?userId=${userId}`);
  const getComments = (postId) => _request(`/comments?postId=${postId}`);

  async function postReport(payload) {
    const res = await fetch(`${Config.BASE_URL}/posts`, {  // /reports não existe; /posts aceita POST
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`POST /reports — HTTP ${res.status}`);
    return res.json();
  }

  return { getUsers, getPosts, getComments, postReport };
})();


/* ============================================================
   MODULE: ui
   Funções puras de manipulação de DOM e feedback visual.
   ============================================================ */
const UI = (() => {

  // Referências DOM
  const els = {
    userSelect:     document.getElementById('userSelect'),
    minChars:       document.getElementById('minChars'),
    minPosts:       document.getElementById('minPosts'),
    generateReport: document.getElementById('generateReport'),
    mainContent:    document.getElementById('mainContent'),
    statusDot:      document.getElementById('statusDot'),
    statusText:     document.getElementById('statusText'),
    toastContainer: document.getElementById('toast-container'),
  };

  // ---- Status bar ----
  function setStatus(state, text) {
    els.statusDot.className = `status-dot ${state}`;
    els.statusText.textContent = text;
  }

  // ---- Toast ----
  function toast(message, type = 'info', duration = 3500) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    els.toastContainer.appendChild(el);
    setTimeout(() => el.remove(), duration);
  }

  // ---- Loading / error states no main ----
  function showLoading(msg = 'processando…') {
    els.mainContent.innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <span>${msg}</span>
      </div>`;
  }

  function showEmpty(msg = 'Selecione um usuário para começar.') {
    els.mainContent.innerHTML = `
      <div class="state-box" style="color:var(--text-3)">
        <span style="font-size:28px">○</span>
        <span>${msg}</span>
      </div>`;
  }

  function showError(msg) {
    els.mainContent.innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
  }

  // ---- Popula o select de usuários ----
  function populateUserSelect(users) {
    els.userSelect.innerHTML =
      '<option value="">— selecione um usuário —</option>' +
      users.map(u =>
        `<option value="${u.id}">${u.name}</option>`
      ).join('');
  }

  // ---- Renderiza painel do usuário + métricas ----
  function renderUserPanel(user, metrics) {
    const { totalPosts, avgChars, avgComments, isActive, filteredPosts } = metrics;

    const statusClass = isActive ? 'ativo' : 'inativo';
    const statusText  = isActive ? 'Ativo' : 'Inativo';

    return `
      <div class="user-panel visible fade-in">
        <div class="user-name">${user.name}</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span class="status-badge ${statusClass}">${statusText}</span>
        </div>
        <div class="user-meta">
          <div class="user-meta-item"><span class="label">email</span> ${user.email}</div>
          <div class="user-meta-item"><span class="label">empresa</span> ${user.company.name}</div>
          <div class="user-meta-item"><span class="label">cidade</span> ${user.address.city}</div>
          <div class="user-meta-item"><span class="label">website</span> ${user.website}</div>
        </div>
      </div>

      <div class="metrics-grid fade-in">
        <div class="metric-card active">
          <span class="metric-label">Posts filtrados</span>
          <span class="metric-value">${totalPosts}</span>
          <span class="metric-sub">de ${metrics.rawTotal} no total</span>
        </div>
        <div class="metric-card success">
          <span class="metric-label">Média de chars</span>
          <span class="metric-value">${avgChars}</span>
          <span class="metric-sub">por post (body)</span>
        </div>
        <div class="metric-card warning">
          <span class="metric-label">Média comentários</span>
          <span class="metric-value">${avgComments}</span>
          <span class="metric-sub">por post</span>
        </div>
        <div class="metric-card ${isActive ? 'active' : ''}">
          <span class="metric-label">Status</span>
          <span class="metric-value" style="font-size:18px;color:${isActive ? 'var(--success)' : 'var(--warn)'}">
            ${statusText}
          </span>
          <span class="metric-sub">mín ${metrics.minPostsThreshold} posts</span>
        </div>
      </div>`;
  }

  // ---- Renderiza tabela de posts ----
  function renderPostsTable(filteredPosts) {
    if (!filteredPosts.length) {
      return `<div class="state-box"><span>Nenhum post atende ao filtro atual.</span></div>`;
    }

    const rows = filteredPosts.map(p => `
      <tr>
        <td style="font-family:var(--mono);font-size:11px;color:var(--text-3);width:48px">#${p.id}</td>
        <td>
          <div class="post-title">${p.title}</div>
          <div class="post-chars">${p.body.length} chars</div>
        </td>
        <td style="text-align:center">
          <span class="comment-count">${p._commentCount}</span>
        </td>
      </tr>`).join('');

    return `
      <div class="posts-section fade-in">
        <div class="section-header">
          <p class="section-label" style="margin:0">Posts</p>
          <span class="posts-count">${filteredPosts.length} resultado(s)</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Título / Caracteres</th>
                <th style="text-align:center">Comentários</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // ---- Atualiza seção principal ----
  function renderMain(user, metrics) {
    els.mainContent.innerHTML =
      renderUserPanel(user, metrics) +
      renderPostsTable(metrics.filteredPosts);
  }

  // ---- Habilita/desabilita botão exportar ----
  function setReportBtn(enabled) {
    els.generateReport.disabled = !enabled;
  }

  return {
    els,
    setStatus,
    toast,
    showLoading,
    showEmpty,
    showError,
    populateUserSelect,
    renderMain,
    setReportBtn,
  };
})();


/* ============================================================
   MODULE: analytics
   Cálculo de métricas puras — sem efeitos colaterais.
   ============================================================ */
const Analytics = (() => {

  function computeMetrics(posts, minChars, minPosts) {
    const rawTotal     = posts.length;
    const filteredPosts = posts.filter(p => p.body.length >= minChars);

    const totalPosts = filteredPosts.length;
    const avgChars   = totalPosts
      ? Math.round(filteredPosts.reduce((s, p) => s + p.body.length, 0) / totalPosts)
      : 0;
    const avgComments = totalPosts
      ? +(filteredPosts.reduce((s, p) => s + (p._commentCount || 0), 0) / totalPosts).toFixed(1)
      : 0;
    const isActive = rawTotal >= minPosts;  // status baseado no total de posts real

    return { rawTotal, totalPosts, avgChars, avgComments, isActive, filteredPosts };
  }

  return { computeMetrics };
})();


/* ============================================================
   MODULE: exporter
   Geração do CSV e simulação do POST para /reports.
   ============================================================ */
const Exporter = (() => {

  function _escape(value) {
    const str = String(value);
    return str.includes(',') || str.includes('"') || str.includes('\n')
      ? `"${str.replace(/"/g, '""')}"`
      : str;
  }

  function toCSV(rows) {
    const headers = ['id_usuario','nome','qtd_posts','media_chars','media_comentarios','status'];
    const lines   = rows.map(r =>
      [r.id, r.name, r.totalPosts, r.avgChars, r.avgComments, r.status].map(_escape).join(',')
    );
    return [headers.join(','), ...lines].join('\n');
  }

  function downloadCSV(csv, filename = 'relatorio_usuarios.csv') {
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function sendReport(payload) {
    return Api.postReport(payload);
  }

  return { toCSV, downloadCSV, sendReport };
})();


/* ============================================================
   MODULE: utils
   Funções utilitárias genéricas.
   ============================================================ */
const Utils = (() => {

  function debounce(fn, delay) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), delay);
    };
  }

  return { debounce };
})();


/* ============================================================
   APP STATE
   Objeto central de estado da aplicação.
   ============================================================ */
const State = {
  users:       [],          // todos os usuários carregados
  currentUser: null,        // usuário selecionado
  posts:       [],          // posts (com _commentCount) do usuário atual
  metrics:     null,        // métricas calculadas
  minChars:    0,
  minPosts:    5,
};


/* ============================================================
   CONTROLLER: app
   Orquestra o fluxo de eventos e conecta os módulos.
   ============================================================ */
const App = (() => {

  // ----------------------------------------------------------
  // TASK 1: Carregamento inicial
  // Busca a lista de usuários e popula o select.
  // ----------------------------------------------------------
  async function init() {
    UI.setStatus('loading', 'buscando usuários…');

    try {
      const users = await Api.getUsers();
      State.users = users;
      UI.populateUserSelect(users);
      UI.showEmpty();
      UI.setStatus('online', `${users.length} usuários carregados`);
      UI.toast(`${users.length} usuários carregados com sucesso.`, 'success');
    } catch (err) {
      UI.setStatus('error', 'falha ao carregar');
      UI.showError(`Não foi possível carregar os usuários: ${err.message}`);
      UI.toast(`Erro: ${err.message}`, 'error', 6000);
    }

    _bindEvents();
  }

  // ----------------------------------------------------------
  // TASK 2: Seleção de usuário
  // Busca posts e comentários; calcula métricas iniciais.
  // ----------------------------------------------------------
  async function onUserChange(userId) {
    if (!userId) {
      State.currentUser = null;
      State.posts       = [];
      State.metrics     = null;
      UI.showEmpty();
      UI.setReportBtn(false);
      return;
    }

    UI.setStatus('loading', 'buscando posts…');
    UI.showLoading('buscando posts e comentários…');

    try {
      const user  = State.users.find(u => u.id === Number(userId));
      const posts = await Api.getPosts(userId);

      // Busca comentários de todos os posts em paralelo
      UI.setStatus('loading', `buscando comentários (${posts.length} posts)…`);
      const commentArrays = await Promise.all(
        posts.map(p => Api.getComments(p.id))
      );

      // Injeta _commentCount em cada post
      const enrichedPosts = posts.map((p, i) => ({
        ...p,
        _commentCount: commentArrays[i].length,
      }));

      State.currentUser = user;
      State.posts       = enrichedPosts;

      _recalculate();
      UI.setStatus('online', `${user.name} carregado`);
      UI.toast(`Dados de "${user.name}" carregados.`, 'success');

    } catch (err) {
      UI.setStatus('error', 'erro ao buscar posts');
      UI.showError(`Falha ao buscar dados do usuário: ${err.message}`);
      UI.toast(`Erro: ${err.message}`, 'error', 6000);
    }
  }

  // ----------------------------------------------------------
  // TASK 3: Recálculo ao mudar filtros
  // Chamado via debounce nos inputs.
  // ----------------------------------------------------------
  function _recalculate() {
    if (!State.currentUser || !State.posts.length) return;

    const minChars = Math.max(0, Number(UI.els.minChars.value) || 0);
    const minPosts = Math.max(0, Number(UI.els.minPosts.value) || 0);

    State.minChars = minChars;
    State.minPosts = minPosts;

    const metrics = Analytics.computeMetrics(State.posts, minChars, minPosts);
    metrics.minPostsThreshold = minPosts;
    State.metrics = metrics;

    UI.renderMain(State.currentUser, metrics);
    UI.setReportBtn(true);
  }

  // ----------------------------------------------------------
  // TASK 4 + 5: Gerar relatório CSV e simular POST
  // ----------------------------------------------------------
  async function onGenerateReport() {
    if (!State.currentUser || !State.metrics) return;

    const { currentUser: user, metrics } = State;

    const row = {
      id:            user.id,
      name:          user.name,
      totalPosts:    metrics.totalPosts,
      avgChars:      metrics.avgChars,
      avgComments:   metrics.avgComments,
      status:        metrics.isActive ? 'Ativo' : 'Inativo',
    };

    // Gera e baixa o CSV
    const csv = Exporter.toCSV([row]);
    Exporter.downloadCSV(csv);
    UI.toast('CSV gerado e download iniciado.', 'success');

    // Task 5: Simula POST para /reports
    try {
      UI.setStatus('loading', 'enviando relatório…');
      const response = await Exporter.sendReport(row);
      UI.setStatus('online', 'relatório enviado');
      UI.toast(`Relatório enviado (id: ${response.id}).`, 'success');
    } catch (err) {
      UI.setStatus('error', 'falha no envio');
      UI.toast(`Falha no envio: ${err.message}`, 'error', 6000);
    }
  }

  // ----------------------------------------------------------
  // Bind de eventos (orientado a eventos)
  // ----------------------------------------------------------
  function _bindEvents() {
    const debouncedRecalc = Utils.debounce(_recalculate, Config.DEBOUNCE_MS);

    UI.els.userSelect.addEventListener('change', e => onUserChange(e.target.value));
    UI.els.minChars.addEventListener('input', debouncedRecalc);
    UI.els.minPosts.addEventListener('input', debouncedRecalc);
    UI.els.generateReport.addEventListener('click', onGenerateReport);
  }

  return { init };
})();

// ----------------------------------------------------------
// BOOT
// ----------------------------------------------------------
document.addEventListener('DOMContentLoaded', () => App.init());

</script>
</body>
</html>
